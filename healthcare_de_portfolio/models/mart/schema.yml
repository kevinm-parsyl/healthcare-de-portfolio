version: 2

models:
  - name: dim_patient
    description: "Patient dimension with diabetic cohort flag. One row per patient."
    columns:
      - name: patient_id
        description: "Primary key — FHIR resource id."
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: is_diabetic
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true, false]
              severity: error

      - name: birth_date
        tests:
          - not_null:
              severity: warn

  - name: fact_encounter
    description: "Encounter fact table. One row per encounter."
    columns:
      - name: encounter_id
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: patient_id
        tests:
          - not_null:
              severity: error
          - relationships:
              to: ref('dim_patient')
              field: patient_id
              severity: warn

      - name: encounter_start
        tests:
          - not_null:
              severity: warn

      - name: is_ed_encounter
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true, false]
              severity: error

      - name: is_inpatient_encounter
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true, false]
              severity: error

  - name: fact_condition
    description: "Condition fact table. One row per condition record."
    columns:
      - name: condition_id
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: patient_id
        tests:
          - not_null:
              severity: error
          - relationships:
              to: ref('dim_patient')
              field: patient_id
              severity: warn

      - name: is_active_confirmed
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true, false]
              severity: error

      - name: is_diabetes_condition
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true, false]
              severity: error

  - name: fact_observation
    description: "Observation fact table. One row per observation."
    columns:
      - name: observation_id
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: patient_id
        tests:
          - not_null:
              severity: error
          - relationships:
              to: ref('dim_patient')
              field: patient_id
              severity: warn

      - name: is_hba1c
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true, false]
              severity: error

      - name: is_hba1c_poor_control
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true, false]
              severity: error

  - name: fact_medication_request
    description: "MedicationRequest fact table. One row per prescription."
    columns:
      - name: medication_request_id
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: patient_id
        tests:
          - not_null:
              severity: error
          - relationships:
              to: ref('dim_patient')
              field: patient_id
              severity: warn

  - name: cms122_measure
    description: "CMS122 HbA1c poor control measure. One row per denominator patient."
    columns:
      - name: patient_id
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: in_denominator
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true]
              severity: error

      - name: in_numerator
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: [true, false]
              severity: error

      - name: measure_result
        tests:
          - not_null:
              severity: error
          - accepted_values:
              values: ['CONTROLLED', 'POOR_CONTROL']
              severity: error

  - name: cms111_measure
    description: "CMS111 ED arrival to departure time. One row per admitted ED encounter."
    columns:
      - name: ed_encounter_id
        tests:
          - unique:
              severity: error
          - not_null:
              severity: error

      - name: patient_id
        tests:
          - not_null:
              severity: error

      - name: ed_time_minutes
        tests:
          - not_null:
              severity: warn